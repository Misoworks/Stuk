[app]
id = "dev.stuk.hello"
name = "Hello"
version = "0.1.0"

[window.main]
title = "Hello"
width = 900
height = 560
min_width = 420
min_height = 280
material = "maris"
chrome = "system"

[permissions]
network = false
notifications = false

[actions.hello.click]
label = "Click me"
shortcut = "Ctrl+Return"

[actions.stuk.inspect]
label = "Inspect"
shortcut = "Ctrl+Shift+I"

[actions.settings.sync.enabled]
label = "Toggle sync"

[actions.app.help]
label = "Help"
shortcut = "F1"

[settings.editor.font_size]
type = "number"
label = "Editor font size"
default = 15
min = 10
max = 30

[settings.appearance.theme]
type = "enum"
label = "Theme"
values = ["system", "light", "dark"]
default = "system"

[settings.appearance.density]
type = "enum"
label = "Density"
values = ["compact", "regular", "touch"]
default = "regular"

[settings.sync.enabled]
type = "boolean"
label = "Enable sync"
default = true
