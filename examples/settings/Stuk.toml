[app]
id = "dev.stuk.settings"
name = "Settings"
version = "0.1.0"

[window.main]
title = "Settings"
width = 900
height = 620
min_width = 560
min_height = 420
material = "maris"
chrome = "sidebar"

[permissions]
network = false
notifications = false
clipboard = true

[actions.settings.sync.enabled]
label = "Toggle Sync"

[actions.settings.appearance.theme.system]
label = "Use System Theme"

[actions.settings.appearance.theme.light]
label = "Use Light Theme"

[actions.settings.appearance.theme.dark]
label = "Use Dark Theme"

[actions.settings.appearance.density.open]
label = "Open Density Menu"

[actions.settings.appearance.density.compact]
label = "Use Compact Density"

[actions.settings.appearance.density.regular]
label = "Use Regular Density"

[actions.settings.appearance.density.touch]
label = "Use Touch Density"

[actions.settings.editor.font_size]
label = "Adjust editor font size"

[actions.settings.nav.appearance]
label = "Show Appearance Settings"

[actions.settings.nav.editor]
label = "Show Editor Settings"

[actions.settings.nav.sync]
label = "Show Sync Settings"

[settings.appearance.theme]
type = "enum"
label = "Theme"
values = ["system", "light", "dark"]
default = "system"

[settings.appearance.density]
type = "enum"
label = "Density"
values = ["compact", "regular", "touch"]
default = "regular"

[settings.editor.font_size]
type = "number"
label = "Editor font size"
default = 15
min = 10
max = 30

[settings.sync.enabled]
type = "boolean"
label = "Enable sync"
default = false
