[app]
id = "dev.stuk.split-view"
name = "Split View"
version = "0.1.0"

[window.main]
title = "Split View"
width = 980
height = 640
min_width = 680
min_height = 440
material = "maris"
chrome = "compact"

[permissions]
network = false
notifications = false

[actions.workspace.refresh]
label = "Refresh"
shortcut = "Ctrl+R"

[actions.workspace.open]
label = "Open"
shortcut = "Ctrl+O"
