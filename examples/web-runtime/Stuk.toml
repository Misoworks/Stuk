[app]
id = "dev.stuk.web-runtime"
name = "Notes"
version = "0.1.0"

[window]
title = "Notes"
width = 860
height = 560
chrome = "stuk"
transparent = true
background_effect = "blur"

[webview]
engine = "cef"
runtime = "shared-preferred"
entry = "ui/index.html"
allow_user_install = true

[webview.dev]
url = "http://localhost:5173"
command = "bun run dev"

[webview.security]
remote_content = false
devtools = "dev-only"
